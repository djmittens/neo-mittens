# gaming.conf - Competitive low-latency gaming overrides
# Sourced from hyprland.conf
#
# Goal: minimize latency between mouse input and pixels-on-screen.
#
# IMPORTANT REALITY CHECK (Wayland on Hyprland 0.54.2):
#   Without fullscreen mode, the compositor is *always* in the render path
#   (verified via `hyprctl monitors -j` -> `solitaryBlockedBy: ['WINDOWED']`).
#   That means tearing (`immediate yes`) and direct scanout never engage on
#   borderless/windowed Overwatch. They only kick in for *exclusive*
#   fullscreen.
#
#   Since user prefers windowed mode (alt-tab UX), the wins available here
#   are limited to: predictable compositor pacing (vfr=false), and tearing
#   rules that activate IF fullscreen is ever used.
#
#   Bigger latency wins come from:
#     - CPU governor (gamemoderun wrapper around launches)
#     - Kernel cmdline (mitigations=off, etc.)
#     - Reflex working in OW (Vulkan VK_NV_low_latency2 confirmed present)

# ============================================================================
# Tearing: opt-in for the rare times Overwatch *is* fullscreen. Harmless
# in windowed mode (Hyprland just ignores `immediate yes` then).
# ============================================================================
general {
    allow_tearing = true
}

# ============================================================================
# Hardware cursor: kept disabled because direct scanout isn't reachable
# without fullscreen anyway, and user prefers SW cursor for consistency
# across windowed apps.
# ============================================================================
cursor {
    no_hardware_cursors = true
}

# ============================================================================
# Misc: vfr=false is THE Hyprland win available in windowed mode.
#
# vfr=true (default): compositor only redraws when "something changed" --
# defers frames opportunistically -> variable latency, occasional micro-stalls
# when input arrives during an idle interval.
#
# vfr=false: compositor renders every monitor refresh interval (every 4.17ms
# at 240Hz). Predictable. Minimum-latency interactive responsiveness.
# Costs: ~1-2W extra GPU power, otherwise free.
# ============================================================================
misc {
    vfr = false
}

# ============================================================================
# WINDOW RULES - Overwatch
# Wine class names from `hyprctl clients` - usually "overwatch.exe" or similar.
# Run `hyprctl clients` after launching OW to verify the actual class string.
# ============================================================================

# Allow tearing (immediate present mode) - the big latency win
# OW under GE-Proton/umu shows up as class:steam_app_default with title:Overwatch
windowrule = immediate yes, match:title ^(Overwatch)$
windowrule = immediate yes, match:class ^([Oo]verwatch.*)$

# Strip cosmetic overhead - target by title for GE-Proton compatibility
windowrule = no_anim on, match:title ^(Overwatch)$
windowrule = no_shadow on, match:title ^(Overwatch)$
windowrule = border_size 0, match:title ^(Overwatch)$
windowrule = rounding 0, match:title ^(Overwatch)$

# Send to games arena (21:9 ~ 5040x2160) on launch.
# Comment this out if you want native 32:9 7680x2160.
windowrule = workspace special:games silent, match:title ^(Overwatch)$

# ============================================================================
# WINDOW RULES - Battle.net launcher
# ============================================================================
windowrule = workspace special:games silent, match:class ^([Bb]attle\.net.*)$
windowrule = no_anim on, match:class ^([Bb]attle\.net.*)$
windowrule = no_shadow on, match:class ^([Bb]attle\.net.*)$

# ============================================================================
# WINDOW RULES - Catch-all for Wine fullscreen apps
# Any XWayland app that's fullscreen gets immediate present.
# ============================================================================
windowrule = immediate yes, match:fullscreen 1, match:xwayland true
