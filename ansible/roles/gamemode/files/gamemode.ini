; /etc/gamemode.ini - system-wide gamemode configuration
; Active when a process registers via gamemoderun.

[general]
; CPU governor to flip *to* on game start. With amd-pstate-EPP +
; EPP=performance, this pins to max boost = no pstate ramp jitter.
desiredgov=performance
defaultgov=powersave

; I/O priority. 0 = "leave alone" in gamemode's encoding.
ioprio=0

; SCHED_ISO is non-preemptive low-jitter realtime. Mainline Linux doesn't
; have it (CK/MuQSS feature) so this gracefully falls back to default
; scheduler. Setting "auto" silences the failure to a debug message.
softrealtime=auto

; Suppress screensaver during gameplay.
inhibit_screensaver=1

; Don't touch /proc/sys/kernel/split_lock_mitigate. Default kernel value
; is fine; gamemode's pkexec attempt fails noisily otherwise.
disable_splitlock=0

[filter]
;whitelist=
;blacklist=

[gpu]
; We DO NOT enable apply_gpu_optimisations. NVIDIA's driver manages its
; own perf states better than gamemode's NVIDIA helper. Setting any
; value other than "accept-responsibility" produces a journal warning,
; so we omit the line entirely.
;apply_gpu_optimisations=accept-responsibility

[cpu]
park_cores=no
pin_cores=yes

[supervisor]
supervisor_whitelist=
supervisor_blacklist=

[custom]
;start=
;end=
