---
# Handlers fire at end-of-play if any task with `notify: <handler>` reported
# a change. Idempotent by design -- if no /etc files changed, mkinitcpio
# doesn't get re-run.

- name: regenerate initramfs
  ansible.builtin.command: mkinitcpio -P
  become: true

- name: regenerate grub config
  ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
  become: true
