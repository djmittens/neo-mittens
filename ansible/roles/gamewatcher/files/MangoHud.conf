# MangoHud config tuned for Overwatch latency diagnostics on RTX 5090.
# Toggle overlay: Right Shift + F12.
# Toggle logging:  Shift_L + F2  (writes to ~/mangohud-logs/)

################################################################################
# What to show (latency-focused, not the kitchen sink)
################################################################################
gpu_stats
gpu_temp
gpu_load_change
gpu_text=GPU
cpu_stats
cpu_temp
cpu_load_change
cpu_text=CPU
core_load
ram

# Frame timing: this is the actual latency-relevant info.
fps
frametime=1
frame_timing=1
fps_limit_method=late          # late-cap = lower latency than early-cap

# Frame-timing graph window (helps eyeball stutters that *feel* like latency)
histogram

# Per-present timing graph: most useful single number for "am I getting 240?"
# At true 240fps each frame is 4.166ms. Stable green = healthy. Spikes = drops.
frametime_graph=1

# Show min/avg/max FPS over the last 10 seconds. If max=240 but avg=200,
# the chain is intermittently dropping.
fps_metrics=avg,1%,0.1%
graphs=cpu_load,gpu_load,frametime,fps

# Present mode + GPU sync info (catches "vsync was on accidentally")
engine_version
vulkan_driver
present_mode
resolution
refresh_rate

# Battery? no. Wifi? no. Time? no. Keep the overlay small.
no_small_font
font_size=20

################################################################################
# Position + cosmetics
################################################################################
position=top-right
background_alpha=0.5
table_columns=2
round_corners=8

################################################################################
# Logging for before/after measurements
################################################################################
output_folder=/home/xyzyx/mangohud-logs
log_duration=60
autostart_log=0
log_interval=0                 # 0 = log every frame (highest fidelity)
toggle_logging=Shift_L+F2

################################################################################
# What we DON'T set (and why)
################################################################################
# fps_limit=234                 # let OW's internal limiter handle it (lower latency)
# vsync=0                       # don't override; OW config controls this
# gl_vsync=0                    # OpenGL only, OW is DX11 -> DXVK -> Vulkan
