# gamewatcher game-detection patterns
#
# One regex per line (extended regex / pgrep -f format). Lines starting
# with `#` are ignored. Patterns match against the full /proc/<pid>/cmdline.
#
# When gamewatcher sees a new process matching any pattern, it:
#   1. Calls com.feralinteractive.GameMode.RegisterGame(pid) over dbus.
#   2. Pins the process to CCD0 via taskset -pc.
#
# IMPORTANT: be SPECIFIC. Wide patterns like "proton" match every Steam
# runtime helper (pv-adverb, srt-bwrap, steam-runtime-launcher-service)
# which are NOT games and shouldn't get gamemode treatment. Steam runtime
# helpers exit quickly so the breakage is short-lived but avoidable.
#
# Use anchors and game-binary-specific names. Test with:
#   pgrep -u $UID -f "<your pattern>"
# while the game is running, to confirm matching is precise.
#
# To add a game: append a line below, save, then:
#   systemctl --user reload gamewatcher
# (sends SIGHUP -> live config reload, no restart needed)

# ============================================================================
# Battle.net / Overwatch
# Match the actual game binary, not the Battle.net launcher (which is
# managed by bnetswitch already and would double-trigger gamemode).
# ============================================================================
# Match Overwatch.exe in any path.
# Wine processes use Windows backslashes in /proc/pid/cmdline, so match
# both `\Overwatch.exe` (Wine/Proton) and `/Overwatch.exe` (native).
[/\\]Overwatch\.exe(\b|$)

# ============================================================================
# Steam games (specific binaries; not generic proton/runtime helpers)
# Add yours here. Names from `pgrep -u $UID -f` while the game is running.
# ============================================================================
# Counter-Strike 2
/cs2(\b|$)
# Counter-Strike: GO  (legacy)
/csgo_linux64(\b|$)
# Half-Life 2
/hl2_linux(\b|$)
# Dota 2
/dota2(\b|$)
# Valorant (uncommon on Linux but pattern works for Wine/Proton)
[/\\]VALORANT(-Win64-Shipping)?\.exe(\b|$)
# League of Legends
[/\\]LeagueClient(\.exe)?(\b|$)
# Cyberpunk 2077
[/\\]Cyberpunk2077\.exe(\b|$)
# RDR2
[/\\]RDR2\.exe(\b|$)
# Witcher 3
[/\\]witcher3\.exe(\b|$)
# Stardew Valley (native)
/StardewValley(\b|$)
# Factorio
/factorio(\b|$)
# Terraria
/Terraria(\b|$)

# ============================================================================
# How to add more (template):
#
# [/\\]YourGameBinary\.exe(\b|$)    (Wine/Proton -- backslash paths)
# /native_game_name(\b|$)           (native Linux -- forward slash paths)
#
# Use [/\\] for .exe games so the pattern matches both Windows backslash
# paths (Wine /proc/pid/cmdline) and forward slash paths (native).
# Anchor with `(\b|$)` after to avoid matching argument values.
# ============================================================================
