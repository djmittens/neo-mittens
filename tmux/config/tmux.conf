# ============================================
# Neo-Mittens Tmux Config
# Host-aware: works on local machines and servers
# ============================================

set-option -sg escape-time 0

# Options to make tmux more pleasant
set -g mouse on
set -g focus-follows-mouse on
set -g default-terminal "tmux-256color"

# ============================================
# Inline graphics (Kitty / Sixel) passthrough
# ============================================
# Required for ratatui-image / kitty-graphics-protocol-using TUIs
# (bnetswitch's rank icons, yazi previews, glow markdown images, etc.)
# to render inside tmux panes.
#
# allow-passthrough lets DCS escapes from inner programs reach the outer
# terminal (kitty) instead of being eaten by tmux. Required globally for
# applications that don't programmatically enable per-pane passthrough.
set -g allow-passthrough on

# Propagate KITTY_WINDOW_ID + TERM_PROGRAM into tmux child processes so
# ratatui-image and similar libs can detect "outer terminal is Kitty"
# and emit Kitty graphics escapes (wrapped in tmux passthrough). Default
# update-environment doesn't include these; without them, tmuxed
# bnetswitch falls back to halfblock/unicode rendering.
set -ga update-environment "KITTY_WINDOW_ID"
set -ga update-environment "KITTY_PUBLIC_KEY"
set -ga update-environment "TERM_PROGRAM"
set -ga update-environment "COLORTERM"
set -ga update-environment "GHOSTTY_RESOURCES_DIR"

# Extended terminal capabilities: tell ncurses-using apps inside tmux
# that the outer terminal supports truecolor + extended keys + 24-bit
# color sequences (kitty does). Without this, ratatui's color rendering
# downgrades to 256-color even though kitty handles the full range.
set -as terminal-features ',xterm-kitty:RGB'
set -as terminal-features ',tmux-256color:RGB'
set -as terminal-overrides ',xterm-kitty:Tc'
set -as terminal-overrides ',tmux-256color:Tc'

set-option -g allow-rename on
set-option -g automatic-rename off

# Create new session with prefix + S
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Paste from clipboard with image support (prefix + P)
# If clipboard contains an image, saves to /tmp/images/ and pastes LLM-friendly reference
bind P run-shell "$HOME/.config/tmux/tmux-paste-image.sh | tmux load-buffer - && tmux paste-buffer"

# ============================================
# HOST-AWARE THEMING
# Obelisk (server): Ember/volcanic theme
# Local machines: Catppuccin Mocha
# ============================================

# Load host-specific theme based on hostname
# Themes are in ~/.config/tmux/themes/
if-shell '[ "$(hostname -s)" = "obelisk" ]' \
    'source-file ~/.config/tmux/themes/obelisk.tmux' \
    'source-file ~/.config/tmux/themes/local.tmux'

# Catppuccin plugin settings (used by local theme)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin-tmux_show_git 0
set -g @catppuccin-tmux_pane_id_style hide 
set -g @catppuccin-tmux_zoom_id_style hide 
set -g @catppuccin-tmux_show_path 1

# Display pane title as window name (set by shell prompt hook)
set -g @catppuccin_window_text "#T"
set -g @catppuccin_window_current_text "#T"

# Status line layout (overridden by obelisk theme on server)
set -g status-right-length 100
set -g status-left-length 100

# ============================================
# PLUGINS (via TPM)
# ============================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Initialize TPM (must be at the very end)
run -b '~/.tmux/plugins/tpm/tpm'
